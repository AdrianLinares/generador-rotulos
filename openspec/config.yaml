# SDD Configuration — generador-rotulos
# Auto-generated by sdd-init, updated after infrastructure setup

project:
  name: generador-rotulos
  description: Web app for generating geological sample labels (rótulos) and canastilla labels as PDFs from tabular data, with Excel/clipboard import and real-time validation.

stack:
  language: typescript
  framework: react-19
  runtime: vite5-swc
  ui_library: shadcn/ui + radix-ui + tailwindcss3
  state_management: zustand + react-query
  forms: react-hook-form + zod
  pdf: jspdf + jspdf-autotable
  routing: react-router-dom6
  package_manager: pnpm@8

architecture:
  pattern: flat-src-layout
  src_dirs:
    - components/
    - components/ui/
    - hooks/
    - types/
    - utils/
    - pages/
    - lib/
    - test/
  path_alias: "@/ -> src/"
  lazy_loading: true
  code_splitting: manual-chunks

  shared_utils:
    - utils/pdfUtils.ts (getImageBase64, truncateLastLine)
    - utils/validation.ts (validateRotulo, validateRotulos, hasValidRotulos)
    - utils/excelParser.ts (parseExcelData, generateSampleData)
    - utils/canastillaExcelParser.ts (parseCanastillaExcelData)
    - utils/canastillaValidation.ts (validateCanastillaRow, validateCanastillaRows)
    - utils/canastilla.ts (groupCanastillaByCaja, formatIdsMuestra, formatPlanchas)

  pdf_generation:
    - utils/pdfGenerator.ts (rótulo PDF with wrapping, truncation for OBSERVACIONES and CONTRATO)
    - utils/canastillaPdfGenerator.ts (canastilla PDF with fitTextToBox auto-sizing)

testing:
  runner: vitest@2
  framework: @testing-library/react + @testing-library/jest-dom + @testing-library/user-event
  environment:
    unit: node
    hooks_and_components: happy-dom
  coverage_tool: v8
  strict_tdd: true
  test_files: "src/**/*.{test,spec}.{ts,tsx}"
  test_count: 115
  note: |
    Strict TDD is active. All new code must have tests before implementation.
    Unit tests use node environment, hook/component tests use happy-dom.
    jsdom@29 has ESM compat issues — do NOT use jsdom as test environment.
    Test runner: pnpm test / pnpm test:watch / pnpm test:coverage

conventions:
  linter: eslint9 + typescript-eslint + react-hooks + react-refresh
  formatter: prettier (singleQuote, semi, tabWidth:2, es5 trailing comma, printWidth:100)
  scripts:
    format: "prettier --write 'src/**/*.{ts,tsx,css}'"
    format:check: "prettier --check 'src/**/*.{ts,tsx,css}'"
    typecheck: "tsc --noEmit"
  commit_style: conventional-commits
  typescript:
    strict: false
    strictNullChecks: true
    noImplicitAny: true
    noUnusedLocals: false
    noUnusedParameters: false
    noFallthroughCasesInSwitch: true
    allowJs: true
  css: tailwindcss + css-variables + shadcn-tokens

pdf_field_truncation_policy:
  observaciones: truncate with '...' when text exceeds available space
  other_fields: wrap with splitTextToSize, never truncate (identification data must be complete)

sdd:
  artifact_store: both
  execution_mode: auto
  delivery_strategy: force-chained
  review_budget_lines: 400